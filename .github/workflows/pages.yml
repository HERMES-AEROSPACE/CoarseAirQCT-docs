# GitHub Pages deploy workflow for HERMES-AEROSPACE/CoarseAirQCT-docs
#
# This file is installed automatically into the public CoarseAirQCT-docs repo
# by the private repo's docs.yml workflow. Do NOT edit it inside the public
# repo directly — edits there will be overwritten on the next deploy.
#
# Source of truth: docs/online-documentation/_deploy/pages.yml in the
# private HERMES-AEROSPACE/CoarseAirQCT repo.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
